<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>排版工具 v28</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{--bg:#060b14;--panel:rgba(18,24,35,.9);--line:rgba(255,255,255,.14);--text:#eef4ff;--accent:#60a5fa}
*{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 1px 1px,rgba(255,255,255,.08) 1px,transparent 1px) 0 0/36px 36px,var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
#toolbar{position:fixed;left:16px;top:16px;z-index:20;display:flex;gap:10px;align-items:center;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(10px)}
button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:10px 16px;font:inherit;cursor:pointer}
#app{position:relative;width:100%;height:100%;overflow:hidden;cursor:grab}#app.panning{cursor:grabbing}
#canvasRoot{position:absolute;left:0;top:0;transform-origin:0 0;width:24000px;height:18000px}
.node{position:absolute;cursor:grab}.node.selected .node-body{outline:2px solid rgba(96,165,250,.9);outline-offset:8px;border-radius:16px}
.node-title{font-size:26px;font-weight:700;margin:0 0 12px 4px;white-space:nowrap}
.node-body{position:relative;display:inline-block}
.placeholder{width:1000px;height:1000px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02)),#212733;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
.placeholder .inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;color:rgba(255,255,255,.38)}
.placeholder .icon{width:84px;height:84px;opacity:.78}.placeholder .text{font-size:24px}
.upload-btn{font-size:22px;padding:12px 24px}
.image-view,.canvas-view{display:block;box-shadow:0 10px 26px rgba(0,0,0,.28)}
.image-view{object-fit:contain}
.canvas-view.white{background:#fff}.canvas-view.checker{background-size:24px 24px;background-image:linear-gradient(45deg,#1d2636 25%,transparent 25%),linear-gradient(-45deg,#1d2636 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1d2636 75%),linear-gradient(-45deg,transparent 75%,#1d2636 75%);background-position:0 0,0 12px,12px -12px,-12px 0px;background-color:#0f172a}
#zoombar{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:21;display:flex;gap:8px;align-items:center;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(10px)}
/* AI 生图面板（布料图 & Logo 共用） */
#aiPanel,#aiPanelLogo{display:none;position:fixed;z-index:200;width:380px;background:rgba(15,22,36,.97);border:1px solid rgba(96,165,250,.4);border-radius:18px;padding:20px;box-shadow:0 12px 40px rgba(0,0,0,.6);backdrop-filter:blur(12px);flex-direction:column;gap:12px}
#aiPanel.show,#aiPanelLogo.show{display:flex}
#aiPanel textarea,#aiPanelLogo textarea{width:100%;min-height:90px;resize:vertical;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#eef4ff;font:14px/1.5 Inter,system-ui,sans-serif;padding:10px 12px;outline:none}
#aiPanel textarea:focus,#aiPanelLogo textarea:focus{border-color:var(--accent)}
#aiPanel .ai-row,#aiPanelLogo .ai-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#aiPanel select,#aiPanel input[type=text],#aiPanelLogo select,#aiPanelLogo input[type=text]{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#eef4ff;font:13px Inter,system-ui,sans-serif;padding:7px 10px;outline:none;flex:1;min-width:0}
#aiPanel .ai-label,#aiPanelLogo .ai-label{font-size:12px;color:rgba(255,255,255,.5);white-space:nowrap}
#aiPanel .ai-close,#aiPanelLogo .ai-close{position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;padding:0;line-height:1}
#aiPanel .ai-send,#aiPanelLogo .ai-send{margin-left:auto;background:var(--accent);border:none;border-radius:10px;color:#fff;font:600 14px Inter,system-ui,sans-serif;padding:10px 22px;cursor:pointer}
#aiPanel .ai-send:disabled,#aiPanelLogo .ai-send:disabled{opacity:.5;cursor:not-allowed}
.fabric-generating{display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,.7);gap:10px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
#zoombar .pct{min-width:84px;text-align:center;font-size:18px;padding:10px 16px;border-radius:12px;background:rgba(255,255,255,.08)}
#hint{position:fixed;left:16px;bottom:16px;z-index:20;max-width:700px;padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;color:rgba(255,255,255,.75);font-size:13px;line-height:1.5}
input[type=file]{display:none}
</style>
</head>
<body>
<div id="toolbar">
  <button id="uploadLogoBtn">上传 Logo</button>
  <button id="saveAllBtn">下载全部结果 PNG</button>
  <label style="margin-left:18px;cursor:pointer;user-select:none;"><input type="checkbox" id="filterToggle" checked> 智能排除（左前、右前）与后背</label>
</div>
<div id="app"><div id="canvasRoot"></div></div>
<!-- AI 生图面板 · 布料图 -->
<div id="aiPanel">
  <button class="ai-close" id="aiPanelClose">✕</button>
  <div style="font-size:15px;font-weight:700;margin-bottom:2px;">AI 生图 · 布料图</div>
  <textarea id="aiPrompt" placeholder="输入提示词，描述你想要的布料风格..."></textarea>
  <div class="ai-row">
    <span class="ai-label">模型</span>
    <input type="text" id="aiModel" value="gemini-3-pro-image-preview" style="flex:2">
  </div>
  <div class="ai-row">
    <span class="ai-label">比例</span>
    <select id="aiRatio">
      <option value="1:1">1:1</option>
      <option value="4:3">4:3</option>
      <option value="3:4">3:4</option>
      <option value="16:9">16:9</option>
      <option value="9:16">9:16</option>
    </select>
    <span class="ai-label">尺寸</span>
    <select id="aiSize">
      <option value="2K">2K</option>
      <option value="1K">1K</option>
      <option value="4K">4K</option>
    </select>
  </div>
  <div class="ai-row">
    <button class="ai-send" id="aiSendBtn">发送</button>
  </div>
</div>
<!-- AI 生图面板 · Logo -->
<div id="aiPanelLogo">
  <button class="ai-close" id="aiPanelLogoClose">✕</button>
  <div style="font-size:15px;font-weight:700;margin-bottom:2px;">AI 生图 · Logo</div>
  <textarea id="aiLogoPrompt" placeholder="输入提示词，描述你想要的 Logo 风格..."></textarea>
  <div class="ai-row">
    <span class="ai-label">模型</span>
    <input type="text" id="aiLogoModel" value="gemini-3-pro-image-preview" style="flex:2">
  </div>
  <div class="ai-row">
    <span class="ai-label">比例</span>
    <select id="aiLogoRatio">
      <option value="1:1">1:1</option>
      <option value="4:3">4:3</option>
      <option value="3:4">3:4</option>
      <option value="16:9">16:9</option>
      <option value="9:16">9:16</option>
    </select>
    <span class="ai-label">尺寸</span>
    <select id="aiLogoSize">
      <option value="2K">2K</option>
      <option value="1K">1K</option>
      <option value="4K">4K</option>
    </select>
  </div>
  <div class="ai-row">
    <button class="ai-send" id="aiLogoSendBtn">发送</button>
  </div>
</div>
<div id="zoombar">
  <button id="fitBtn">适合屏幕</button>
  <button id="zoomOutBtn">－</button>
  <div id="zoomPct" class="pct">100%</div>
  <button id="zoomInBtn">＋</button>
  <button id="zoom50Btn">50%</button>
  <button id="zoom100Btn">100%</button>
  <button id="zoom200Btn">200%</button>
</div>
<div id="hint">所有空节点默认 1000×1000。上传布料图后，会自动显示布料图，并自动加载 S / M / L / XL / XXL 五个默认 Mask。布局定位五组都会显示。上传 Logo 仅作用于 布局定位(S)。</div>
<input id="fabricInput" type="file" accept="image/*" />

const PLACE_W = 1000, PLACE_H = 1000;
const SIZES = [
  {key:'S', label:'S', mask:EMBEDDED_ASSETS["BFSK26308XCJ01L-S_mask.png"]},
  {key:'M', label:'M', mask:EMBEDDED_ASSETS["BFSK26308XCJ01L-M_mask.png"]},
  {key:'L', label:'L', mask:EMBEDDED_ASSETS["BFSK26308XCJ01L-L_mask.png"]},
  {key:'XL', label:'XL', mask:EMBEDDED_ASSETS["BFSK26308XCJ01L-XL_mask.png"]},

];
const app = document.getElementById('app');
const root = document.getElementById('canvasRoot');
const fabricInput = document.getElementById('fabricInput');
const zoomPct = document.getElementById('zoomPct');

const logoInput = document.createElement('input');
logoInput.type = 'file';
logoInput.accept = 'image/*';
logoInput.multiple = true;
logoInput.style.display = 'none';
document.body.appendChild(logoInput);

document.getElementById('filterToggle').addEventListener('change', ()=>{ requestAnimationFrame(renderAll); });

const state = {
  panX: 80, panY: 60, zoom: 0.22,
  fabricImage: null, fabricSrc: null,
  logoImage: null, logoSrc: null,
  selectedNodeId: null, selectedObjectId: null,
  panDrag: null, nodeDrag: null, objectDrag: null,
  nodes: {}, groups: {},
  logos: { S:[], M:[], L:[], XL:[], XXL:[] }
};

function initState(){
  state.nodes.fabric = {id:'fabric', title:'布料图', x:120, y:120, width:PLACE_W, height:PLACE_H};
  state.nodes.logo   = {id:'logo',   title:'Logo',   x:120, y:120+PLACE_H+80, width:PLACE_W, height:PLACE_H};
  const startX = 1500, startY = 120, colGap = 820, rowGap = 360;
  SIZES.forEach((s, idx)=>{
    const y = startY + idx * rowGap;
    state.groups[s.key] = {key:s.key, label:s.label, maskUrl:s.mask, maskImage:null, pieces:[]};
    state.nodes['result_'+s.key] = {id:'result_'+s.key, title:`结果预览(${s.label})`, x:startX, y, width:PLACE_W, height:PLACE_H, group:s.key, kind:'result'};
    state.nodes['mask_'+s.key]   = {id:'mask_'+s.key,   title:`排版图(${s.label})`, x:startX+colGap, y, width:PLACE_W, height:PLACE_H, group:s.key, kind:'mask'};
    state.nodes['layout_'+s.key] = {id:'layout_'+s.key, title:`布局定位(${s.label})`, x:startX+colGap*2, y, width:PLACE_W, height:PLACE_H, group:s.key, kind:'layout'};
  });
}
function loadImage(src){return new Promise((resolve,reject)=>{const i=new Image(); i.onload=()=>resolve(i); i.onerror=(e)=>reject(new Error('图片加载失败: '+src)); i.src=src;});}
function nodeDisplaySize(img, scale=1){let w=img.naturalWidth*scale, h=img.naturalHeight*scale; if(w>3000){const s=3000/w; w*=s; h*=s;} return {width:Math.round(w), height:Math.round(h)};}
function makeCanvas(w,h,cls='canvas-view'){const c=document.createElement('canvas'); c.width=w; c.height=h; c.className=cls; c.style.width=w+'px'; c.style.height=h+'px'; return c;}

function setZoom(nz, sx=window.innerWidth/2, sy=window.innerHeight/2){nz=Math.max(0.08,Math.min(4,nz)); const wx=(sx-state.panX)/state.zoom; const wy=(sy-state.panY)/state.zoom; state.zoom=nz; state.panX=sx-wx*nz; state.panY=sy-wy*nz; applyViewport();}
function fitToScreen(){const arr=Object.values(state.nodes); let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity; arr.forEach(n=>{minX=Math.min(minX,n.x); minY=Math.min(minY,n.y); maxX=Math.max(maxX,n.x+n.width); maxY=Math.max(maxY,n.y+n.height+50);}); if(!isFinite(minX)) return; const pad=80, tw=maxX-minX+pad*2, th=maxY-minY+pad*2; const z=Math.min(window.innerWidth/tw, window.innerHeight/th, 1.4); state.zoom=Math.max(0.08,z); state.panX=pad-minX*state.zoom; state.panY=pad-minY*state.zoom; applyViewport();}

function createNode(node){
  const wrap=document.createElement('div'); wrap.className='node'; wrap.dataset.id=node.id; wrap.style.left=node.x+'px'; wrap.style.top=node.y+'px';
  const title=document.createElement('div'); title.className='node-title'; title.textContent=node.title; wrap.appendChild(title);
  const body=document.createElement('div'); body.className='node-body'; wrap.appendChild(body);
  wrap.addEventListener('pointerdown', e=>{ if(e.target.closest('.upload-btn')||e.target.dataset.object) return; selectNode(node.id); state.nodeDrag={id:node.id,sx:e.clientX,sy:e.clientY,ox:node.x,oy:node.y}; e.stopPropagation();});
  if(node.id==='fabric'){
    body.style.cursor='pointer';
    body.addEventListener('click', e=>{ if(e.target.closest('.upload-btn')) return; showAiPanel('fabric'); });
  }
  if(node.id==='logo'){
    body.style.cursor='pointer';
    body.addEventListener('click', e=>{ if(e.target.closest('.upload-btn')) return; showAiPanel('logo'); });
  }
  renderNodeContent(node, body); return wrap;
}

function renderNodeContent(node, body){
  body.innerHTML='';
  if(node.id==='fabric'){
    if(!state.fabricImage){body.appendChild(placeholderFabric()); node.width=PLACE_W; node.height=PLACE_H; return;}
    const img=document.createElement('img'); img.className='image-view'; img.src=state.fabricSrc; img.style.width=node.width+'px'; img.style.height=node.height+'px'; body.appendChild(img); return;
  }
  if(node.id==='logo'){
    if(!state.logoImage){body.appendChild(placeholderAi('点击 AI 生成 Logo')); node.width=PLACE_W; node.height=PLACE_H; return;}
    const img=document.createElement('img'); img.className='image-view'; img.src=state.logoSrc; img.style.width=node.width+'px'; img.style.height=node.height+'px'; img.style.objectFit='contain'; body.appendChild(img); return;
  }
  const group=state.groups[node.group];
  if(!group.maskImage){body.appendChild(placeholder(false)); node.width=PLACE_W; node.height=PLACE_H; return;}
  if(node.kind==='mask'){const c=makeCanvas(group.maskImage.naturalWidth,group.maskImage.naturalHeight,'canvas-view checker'); drawMask(group,c); c.style.width=node.width+'px'; c.style.height=node.height+'px'; body.appendChild(c); return;}

}

function drawMask(group, canvas){const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(group.maskImage,0,0);}
function getLayoutTileCanvas(node){const tile=document.createElement('canvas'); tile.width=node.width; tile.height=node.height; const t=tile.getContext('2d'); t.clearRect(0,0,tile.width,tile.height); if(state.fabricImage){const fw=node.width/2, fh=node.height/2; t.drawImage(state.fabricImage,0,0,fw,fh); t.drawImage(state.fabricImage,fw,0,fw,fh); t.drawImage(state.fabricImage,0,fh,fw,fh); t.drawImage(state.fabricImage,fw,fh,fw,fh);} return tile;}
function drawLogosForGroup(ctx, key){
  const logos=state.logos[key]||[];
  logos.forEach(l=>{
    if(!l.image) return;
    ctx.save();
    ctx.translate(l.x+l.w/2, l.y+l.h/2);
    ctx.rotate(l.rotation||0);
    ctx.drawImage(l.image,-l.w/2,-l.h/2,l.w,l.h);
    if(state.selectedObjectId===l.id){
      ctx.strokeStyle='rgba(255,200,0,.9)'; ctx.lineWidth=3;
      ctx.strokeRect(-l.w/2,-l.h/2,l.w,l.h);

      ctx.fillRect(l.w/2-10,-l.h/2,10,10);       // 右上
      ctx.fillRect(l.w/2-10,l.h/2-10,10,10);     // 右下（缩放）
      ctx.fillRect(-l.w/2,l.h/2-10,10,10);       // 左下
    }
    ctx.restore();
  });
}
function drawLayout(group, canvas){
  const node=state.nodes['layout_'+group.key];
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const hw=W/2, hh=H/2;
  ctx.clearRect(0,0,W,H);

  // 4象限背景（用布料图平铺，背景不动）
  if(state.fabricImage){
    ctx.drawImage(state.fabricImage,0,0,hw,hh);   // 左上
    ctx.drawImage(state.fabricImage,hw,0,hw,hh);  // 右上
    ctx.drawImage(state.fabricImage,0,hh,hw,hh);  // 左下
    ctx.drawImage(state.fabricImage,hw,hh,hw,hh); // 右下
  }
  // 象限分隔线
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.35)';
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(hw,0); ctx.lineTo(hw,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,hh); ctx.lineTo(W,hh); ctx.stroke();
  ctx.restore();

  // 绘制裁切片（使用p.x,p.y坐标，支持拖拽）
  // S 尺寸始终显示全部裁切片（含左前、右前、后背）
  const useFilter=document.getElementById('filterToggle').checked && group.key!=='S';
  const drawList=useFilter?(group.layoutPieces||group.pieces):group.pieces;
  drawList.forEach(p=>{
    const s=p.layoutScale||1;
    const lw=p.displayW*s, lh=p.displayH*s;
    ctx.save();
    ctx.translate(p.x+lw/2, p.y+lh/2);
    ctx.rotate(p.rotation);
    ctx.drawImage(p.outlineCanvas,-lw/2,-lh/2,lw,lh);
    if(state.selectedObjectId===p.id){
      ctx.strokeStyle='rgba(96,165,250,.9)'; ctx.lineWidth=2;
      ctx.strokeRect(-lw/2,-lh/2,lw,lh);
    }
    ctx.restore();
  });
  drawLogosForGroup(ctx, group.key);
}
function drawResult(group, canvas){
  const ctx=canvas.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!state.fabricImage||!group.maskImage||!group.pieces.length) return;
  // tile 与布局定位显示画布同尺寸（ms.width*2 × ms.height*2）
  const layoutNode=state.nodes['layout_'+group.key];
  const tile=getLayoutTileCanvas(layoutNode);
  if(group.key==='S' && (state.logos.S||[]).length){const lctx=tile.getContext('2d'); drawLogosForS(lctx);}
  // 布局定位显示尺寸 vs mask 原始尺寸的缩放比
  const scaleX=layoutNode.width/(group.maskImage.naturalWidth*2);
  const scaleY=layoutNode.height/(group.maskImage.naturalHeight*2);
  group.pieces.forEach(p=>{
    const temp=document.createElement('canvas'); temp.width=p.bbox.w; temp.height=p.bbox.h;
    const tctx=temp.getContext('2d');
    // p.x/p.y 是布局定位显示坐标，需换算回 tile 坐标系（tile 与 layoutNode 等尺寸）
    const px=p.x, py=p.y;
    const pdw=p.displayW*(p.layoutScale||1), pdh=p.displayH*(p.layoutScale||1);
    // 从 tile 中裁出对应的布料区域，映射到 bbox 尺寸
    const sx=(p.bbox.w/pdw)||1, sy=(p.bbox.h/pdh)||1;
    tctx.save(); tctx.translate(p.bbox.w/2,p.bbox.h/2); tctx.scale(sx,sy); tctx.rotate(-p.rotation);
    tctx.drawImage(tile,-px-pdw/2,-py-pdh/2);
    tctx.restore();
    tctx.globalCompositeOperation='destination-in'; tctx.drawImage(p.maskCanvas,0,0);
    tctx.globalCompositeOperation='source-over'; ctx.drawImage(temp,p.originX,p.originY);
  });
}

function extractPieces(group){
  const img=group.maskImage; const cvs=document.createElement('canvas'); cvs.width=img.naturalWidth; cvs.height=img.naturalHeight; const c=cvs.getContext('2d'); c.drawImage(img,0,0); const data=c.getImageData(0,0,cvs.width,cvs.height); const w=cvs.width,h=cvs.height, visited=new Uint8Array(w*h), pieces=[]; const alphaAt=(x,y)=>data.data[(y*w+x)*4+3];
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const idx=y*w+x; if(visited[idx]||alphaAt(x,y)<20) continue;
    const q=[[x,y]]; visited[idx]=1; const pts=[]; let minx=x,maxx=x,miny=y,maxy=y;
    while(q.length){const [cx,cy]=q.pop(); pts.push([cx,cy]); if(cx<minx)minx=cx; if(cx>maxx)maxx=cx; if(cy<miny)miny=cy; if(cy>maxy)maxy=cy; [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{const nx=cx+dx, ny=cy+dy; if(nx<0||ny<0||nx>=w||ny>=h) return; const ni=ny*w+nx; if(visited[ni]||alphaAt(nx,ny)<20) return; visited[ni]=1; q.push([nx,ny]);}); }
    if(pts.length<300) continue;
    const pw=maxx-minx+1, ph=maxy-miny+1;
    const maskCanvas=document.createElement('canvas'); maskCanvas.width=pw; maskCanvas.height=ph; const mctx=maskCanvas.getContext('2d'); const imgData=mctx.createImageData(pw,ph);
    pts.forEach(([px,py])=>{const dx=((py-miny)*pw + (px-minx))*4; imgData.data[dx]=255; imgData.data[dx+1]=255; imgData.data[dx+2]=255; imgData.data[dx+3]=255;}); mctx.putImageData(imgData,0,0);
    const outlineCanvas=document.createElement('canvas'); outlineCanvas.width=pw; outlineCanvas.height=ph; const octx=outlineCanvas.getContext('2d'); octx.clearRect(0,0,pw,ph); octx.lineWidth=5; octx.strokeStyle='#000';
    pts.forEach(([px,py])=>{const lx=px-minx, ly=py-miny; const open=(nx,ny)=>nx<0||ny<0||nx>=w||ny>=h||alphaAt(nx,ny)<20; if(open(px-1,py)){octx.beginPath();octx.moveTo(lx+0.5,ly);octx.lineTo(lx+0.5,ly+1);octx.stroke();} if(open(px+1,py)){octx.beginPath();octx.moveTo(lx+0.5,ly);octx.lineTo(lx+0.5,ly+1);octx.stroke();} if(open(px,py-1)){octx.beginPath();octx.moveTo(lx,ly+0.5);octx.lineTo(lx+1,ly+0.5);octx.stroke();} if(open(px,py+1)){octx.beginPath();octx.moveTo(lx,ly+0.5);octx.lineTo(lx+1,ly+0.5);octx.stroke();} });
    pieces.push({id:`${group.key}-piece-${pieces.length+1}`, bbox:{x:minx,y:miny,w:pw,h:ph}, originX:minx, originY:miny, displayW:Math.max(1,Math.round(pw*PREVIEW_SCALE)), displayH:Math.max(1,Math.round(ph*PREVIEW_SCALE)), x:minx*PREVIEW_SCALE, y:miny*PREVIEW_SCALE, rotation:0, maskCanvas, outlineCanvas});
  }
  group.pieces=pieces;
  // 过滤掉前片(左前、右前)和后片(背后)，仅用于布局定位显示
  group.layoutPieces = filterOutFrontBack(pieces);

function classifyPieces(pieces){
  // 返回 {back, fronts, others}
  if(pieces.length<4) return {back:null, fronts:[], others:pieces.slice()};
  const sorted=[...pieces].sort((a,b)=>(b.bbox.w*b.bbox.h)-(a.bbox.w*a.bbox.h));
  const back=sorted[0];
  const removeSet=new Set([back]);
  // 前片对 = aspect(宽/高)在0.35-0.45之间、面积最接近的一对
  const candidates=sorted.filter(p=>{
    const aspect=p.bbox.w/p.bbox.h;
    return aspect>=0.35 && aspect<=0.45 && !removeSet.has(p);
  });
  let fronts=[], bestDiff=Infinity;
  for(let i=0;i<candidates.length;i++){
    for(let j=i+1;j<candidates.length;j++){
      const a1=candidates[i].bbox.w*candidates[i].bbox.h;
      const a2=candidates[j].bbox.w*candidates[j].bbox.h;
      const diff=Math.abs(a1-a2)/Math.max(a1,a2);
      if(diff<bestDiff){bestDiff=diff; fronts=[candidates[i],candidates[j]];}
    }
  }
  fronts.forEach(p=>removeSet.add(p));
  const others=pieces.filter(p=>!removeSet.has(p));
  return {back, fronts, others};
}
function filterOutFrontBack(pieces){
  const {back, fronts, others}=classifyPieces(pieces);
  return others;
}
function initLayoutPositions(group){
  const node=state.nodes['layout_'+group.key];
  const W=node.width, H=node.height;
  const hw=W/2, hh=H/2;
  const {back, fronts, others}=classifyPieces(group.pieces);
  // 左上：左前+右前，左下：后背，右上：others前半，右下：others后半
  placePiecesInQuadrant(fronts,            0,  0,  hw, hh);
  placePiecesInQuadrant(back?[back]:[],    0,  hh, hw, hh);
  const half=Math.ceil(others.length/2);
  placePiecesInQuadrant(others.slice(0,half), hw, 0,  hw, hh);
  placePiecesInQuadrant(others.slice(half),   hw, hh, hw, hh);
}
function placePiecesInQuadrant(pieces, qx, qy, qw, qh){
  if(!pieces||!pieces.length) return;
  const pad=16;
  const n=pieces.length;
  const cols=Math.ceil(Math.sqrt(n)), rows=Math.ceil(n/cols);
  const cellW=(qw-pad*(cols+1))/cols;
  const cellH=(qh-pad*(rows+1))/rows;
  pieces.forEach((p,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const cx=qx+pad+(col*(cellW+pad))+cellW/2;
    const cy=qy+pad+(row*(cellH+pad))+cellH/2;
    // layoutScale: 在布局定位中显示时的缩放比（不影响drawResult用的displayW/H）
    p.layoutScale=Math.min(cellW/p.displayW, cellH/p.displayH, 1);
    const lw=p.displayW*p.layoutScale, lh=p.displayH*p.layoutScale;
    p.x=Math.round(cx-lw/2);
    p.y=Math.round(cy-lh/2);
  });
}
function clampPiece(group,p){const node=state.nodes['layout_'+group.key]; const s=p.layoutScale||1; const w=p.displayW*s, h=p.displayH*s, rot=p.rotation; const hw=w/2,hh=h/2; const cos=Math.cos(rot), sin=Math.sin(rot); const pts=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([x,y])=>({x:x*cos-y*sin,y:x*sin+y*cos})); const minX=Math.min(...pts.map(a=>a.x)), maxX=Math.max(...pts.map(a=>a.x)), minY=Math.min(...pts.map(a=>a.y)), maxY=Math.max(...pts.map(a=>a.y)); let cx=Math.min(Math.max(p.x+w/2,-minX), node.width-maxX); let cy=Math.min(Math.max(p.y+h/2,-minY), node.height-maxY); p.x=cx-w/2; p.y=cy-h/2;}
function clampLogo(logo){const node=state.nodes['layout_S']; logo.x=Math.max(0,Math.min(logo.x,node.width-logo.w)); logo.y=Math.max(0,Math.min(logo.y,node.height-logo.h));}
function pointInRotRect(px,py,x,y,w,h,rot){const cx=x+w/2, cy=y+h/2, cos=Math.cos(-rot), sin=Math.sin(-rot); const dx=px-cx, dy=py-cy; const rx=dx*cos-dy*sin+w/2, ry=dx*sin+dy*cos+h/2; return rx>=0&&ry>=0&&rx<=w&&ry<=h;}
function layoutPosFromEvent(e, node){const rect=root.querySelector(`.node[data-id="${node.id}"] canvas`).getBoundingClientRect(); const sx=node.width/rect.width, sy=node.height/rect.height; return {x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy};}
function onLayoutPointerDown(e){
  e.stopPropagation();
  const nodeId=e.currentTarget.parentElement.parentElement.dataset.id; const node=state.nodes[nodeId]; const group=state.groups[node.group]; selectNode(nodeId); const pos=layoutPosFromEvent(e,node);
  let hit=null; 
  if(group.key==='S'){
    const logos=state.logos.S||[];
    for(let i=logos.length-1;i>=0;i--){const l=logos[i]; if(pointInRotRect(pos.x,pos.y,l.x,l.y,l.w,l.h,l.rotation||0)){hit=l; break;}}
  }
  if(hit){selectObject(hit.id,nodeId); state.objectDrag={kind:'logo',id:hit.id,group:'S',mode:e.shiftKey?'rotate':'move',sx:e.clientX,sy:e.clientY,ox:hit.x,oy:hit.y,or:hit.rotation||0}; return;}
  const lp=(document.getElementById('filterToggle').checked && group.key!=='S')?(group.layoutPieces||group.pieces):group.pieces;
  for(let i=lp.length-1;i>=0;i--){const p=lp[i]; const _s=p.layoutScale||1; if(pointInRotRect(pos.x,pos.y,p.x,p.y,p.displayW*_s,p.displayH*_s,p.rotation)){hit=p; break;}}
  if(hit){selectObject(hit.id,nodeId); state.objectDrag={kind:'piece',group:group.key,id:hit.id,mode:e.shiftKey?'rotate':'move',sx:e.clientX,sy:e.clientY,ox:hit.x,oy:hit.y,or:hit.rotation};}
}
async function setFabric(src){
  state.fabricSrc=src; state.fabricImage=await loadImage(src);
  // 布料图节点固定显示为 PLACE_W × PLACE_H，保持宽高比居中显示
  const img=state.fabricImage;
  const ratio=img.naturalWidth/img.naturalHeight;
  let fw=PLACE_W, fh=PLACE_H;
  if(ratio>1){ fh=Math.round(PLACE_W/ratio); } else { fw=Math.round(PLACE_H*ratio); }
  state.nodes.fabric.width=fw; state.nodes.fabric.height=fh;
  await loadAllMasks();
  relayoutNodes(); renderAll(); fitToScreen();
}
async function loadAllMasks(){
  await Promise.all(SIZES.map(async s=>{
    const g=state.groups[s.key]; g.maskImage=await loadImage(s.mask); extractPieces(g);
    const ms=nodeDisplaySize(g.maskImage, PREVIEW_SCALE);
    state.nodes['mask_'+s.key].width=ms.width; state.nodes['mask_'+s.key].height=ms.height;
    state.nodes['result_'+s.key].width=ms.width; state.nodes['result_'+s.key].height=ms.height;
    // 布局定位节点尺寸：与排版图显示尺寸相同（2×2平铺故×2）
    state.nodes['layout_'+s.key].width=ms.width*2; state.nodes['layout_'+s.key].height=ms.height*2;
    initLayoutPositions(g);
  }));
}
function relayoutNodes(){
  const fabricW=state.nodes.fabric.width, fabricH=state.nodes.fabric.height;
  state.nodes.fabric.x=120; state.nodes.fabric.y=120;
  // logo 节点放在布料图下方，与布料图等宽
  state.nodes.logo.x=120; state.nodes.logo.y=120+fabricH+80;
  state.nodes.logo.width=fabricW;
  const colGap=200; const rowGap=200;
  const col1=state.nodes.fabric.x+fabricW+220;
  let y=120;
  SIZES.forEach(s=>{
    const r=state.nodes['result_'+s.key], m=state.nodes['mask_'+s.key], l=state.nodes['layout_'+s.key];
    m.x=col1; m.y=y; r.x=col1+m.width+colGap; r.y=y; l.x=r.x+r.width+colGap; l.y=y;
    y += Math.max(r.height,m.height,l.height)+rowGap;
  });
}
async function saveAll(){
  const zip=new JSZip();
  let hasAny=false;
  for(const s of SIZES){
    const g=state.groups[s.key]; if(!g.maskImage) continue; hasAny=true;
    const c=document.createElement('canvas');
    // 用 mask 原始尺寸输出，而非 PREVIEW_SCALE 缩小后的显示尺寸
    c.width=g.maskImage.naturalWidth; c.height=g.maskImage.naturalHeight;
    drawResult(g,c);
    const dataUrl=c.toDataURL('image/png');
    const base64=dataUrl.split(',')[1];
    zip.file(`result-${s.key}.png`, base64, {base64:true});
  }
  if(!hasAny){alert('请先上传布料图'); return;}
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='results.zip'; a.click();
}

window.addEventListener('pointermove',e=>{
  if(state.panDrag){state.panX=state.panDrag.ox+(e.clientX-state.panDrag.sx); state.panY=state.panDrag.oy+(e.clientY-state.panDrag.sy); applyViewport(); return;}
  if(state.nodeDrag){const n=state.nodes[state.nodeDrag.id]; n.x=state.nodeDrag.ox+(e.clientX-state.nodeDrag.sx)/state.zoom; n.y=state.nodeDrag.oy+(e.clientY-state.nodeDrag.sy)/state.zoom; const el=root.querySelector(`.node[data-id="${n.id}"]`); if(el){el.style.left=n.x+'px'; el.style.top=n.y+'px';} return;}
  if(state.objectDrag){
    if(state.objectDrag.kind==='logo'){
      const logos=state.logos.S||[]; const l=logos.find(i=>i.id===state.objectDrag.id); if(!l) return; if(state.objectDrag.mode==='move'){l.x=state.objectDrag.ox+(e.clientX-state.objectDrag.sx)/state.zoom; l.y=state.objectDrag.oy+(e.clientY-state.objectDrag.sy)/state.zoom;} else {l.rotation=state.objectDrag.or+(e.clientX-state.objectDrag.sx)/(180*state.zoom);} clampLogo(l); ['layout_S','result_S'].forEach(id=>{const c=root.querySelector(`.node[data-id="${id}"] canvas`); if(c){id.startsWith('layout')?drawLayout(state.groups.S,c):drawResult(state.groups.S,c);}}); return;
    }
    const g=state.groups[state.objectDrag.group]; const _lp=(document.getElementById('filterToggle').checked && g.key!=='S')?(g.layoutPieces||g.pieces):g.pieces; const p=_lp.find(i=>i.id===state.objectDrag.id); if(!p) return; if(state.objectDrag.mode==='move'){p.x=state.objectDrag.ox+(e.clientX-state.objectDrag.sx)/state.zoom; p.y=state.objectDrag.oy+(e.clientY-state.objectDrag.sy)/state.zoom;} else {p.rotation=state.objectDrag.or+(e.clientX-state.objectDrag.sx)/(180*state.zoom);} clampPiece(g,p); const lc=root.querySelector(`.node[data-id="layout_${g.key}"] canvas`); const rc=root.querySelector(`.node[data-id="result_${g.key}"] canvas`); if(lc) drawLayout(g,lc); if(rc) drawResult(g,rc);
  }
});
window.addEventListener('pointerup',()=>{state.panDrag=null; state.nodeDrag=null; state.objectDrag=null; app.classList.remove('panning');});
app.addEventListener('pointerdown',e=>{if(e.target.closest('.node')||e.target.closest('#toolbar')||e.target.closest('#zoombar')) return; state.panDrag={sx:e.clientX, sy:e.clientY, ox:state.panX, oy:state.panY}; app.classList.add('panning');});
app.addEventListener('wheel',e=>{e.preventDefault(); setZoom(state.zoom*(e.deltaY<0?1.1:0.9),e.clientX,e.clientY);},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.key!=='Delete'&&e.key!=='Backspace') return;
  if(state.selectedNodeId==='fabric'){state.fabricImage=null; state.fabricSrc=null; fabricInput.value=''; SIZES.forEach(s=>{const g=state.groups[s.key]; g.maskImage=null; g.pieces=[];}); state.logos.S=[]; relayoutNodes(); renderAll(); return;}
  if(state.selectedObjectId){
    const logos=state.logos.S||[]; const idx=logos.findIndex(l=>l.id===state.selectedObjectId); if(idx>=0){logos.splice(idx,1); state.selectedObjectId=null; renderAll();}
  }
});
document.getElementById('uploadLogoBtn').onclick=()=>logoInput.click();
document.getElementById('saveAllBtn').onclick=()=>saveAll();
fabricInput.addEventListener('change',async e=>{const f=e.target.files[0]; if(!f) return; try{await setFabric(URL.createObjectURL(f));}catch(err){alert(err.message||String(err)); console.error(err);}});

// ===== AI 生图面板（布料图 & Logo 独立）=====
const aiPanel=document.getElementById('aiPanel');
const aiPanelLogo=document.getElementById('aiPanelLogo');
document.getElementById('aiPanelClose').onclick=()=>aiPanel.classList.remove('show');
document.getElementById('aiPanelLogoClose').onclick=()=>aiPanelLogo.classList.remove('show');

// 弹出对应面板，定位在节点下方
function showAiPanel(kind){
  // 关闭另一个面板
  aiPanel.classList.remove('show');
  aiPanelLogo.classList.remove('show');
  const nodeId = kind==='logo' ? 'logo' : 'fabric';
  const panel  = kind==='logo' ? aiPanelLogo : aiPanel;
  const el=root.querySelector(`.node[data-id="${nodeId}"]`);
  if(!el) return;
  const rect=el.getBoundingClientRect();
  const pw=panel.offsetWidth||380;
  let left=rect.left;
  let top=rect.bottom+12;
  if(left+pw>window.innerWidth-10) left=window.innerWidth-pw-10;
  if(left<10) left=10;
  // 防止超出屏幕底部
  if(top+300>window.innerHeight) top=rect.top-320;
  panel.style.left=left+'px';
  panel.style.top=top+'px';
  panel.classList.add('show');
}

// --- 布料图 AI 发送 ---
document.getElementById('aiSendBtn').onclick=async()=>{
  const prompt=document.getElementById('aiPrompt').value.trim();
  if(!prompt){alert('请输入提示词'); return;}
  const modelName=document.getElementById('aiModel').value.trim()||'gemini-3-pro-image-preview';
  const aspectRatio=document.getElementById('aiRatio').value;
  const size=document.getElementById('aiSize').value;
  aiPanel.classList.remove('show');
  setNodeGenerating('fabric', true);
  try{
    const res=await fetch('/api/generate-image',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt, modelName, aspectRatio, size, numImages:'1', outputFormat:'png'})});
    const data=await res.json();
    if(!data.success) throw new Error(data.error||'生图失败');
    const saved=data.savedImages||[]; if(!saved.length) throw new Error('未返回图片');
    setNodeGenerating('fabric', false);
    await setFabric(saved[0].localUrl);
  }catch(err){
    setNodeGenerating('fabric', false);
    alert('AI 生图（布料）失败：'+(err.message||String(err)));
  }
};

document.getElementById('aiLogoSendBtn').onclick=async()=>{

// 通用：节点显示"生图中…"
function setNodeGenerating(nodeId, on){
  const node=state.nodes[nodeId];
  const el=root.querySelector(`.node[data-id="${nodeId}"] .node-body`);
  if(!el) return;
  if(on){
    el.innerHTML='<div class="placeholder"><div class="inner"><div class="fabric-generating">⏳ 生图中，请稍候…</div></div></div>';
    node.width=PLACE_W; node.height=PLACE_H;
    const wrap=root.querySelector(`.node[data-id="${nodeId}"]`);
    if(wrap){wrap.style.left=node.x+'px'; wrap.style.top=node.y+'px';}
  }
}

// 加载 Logo 图片并加入布局定位(S)
async function setLogoImage(src){
  const img=await loadImage(src);
  state.logoImage=img; state.logoSrc=src;
  // logo 节点固定显示为 PLACE_W×PLACE_H，保持宽高比
  const ratio=img.naturalWidth/img.naturalHeight;
  let lw=PLACE_W, lh=PLACE_H;
  if(ratio>1){ lh=Math.round(PLACE_W/ratio); } else { lw=Math.round(PLACE_H*ratio); }
  state.nodes.logo.width=lw; state.nodes.logo.height=lh;
  // 将 logo 加入布局定位(S)——替换旧的 AI logo（只保留1个AI logo，id固定为'ai-logo'）
  const maxW=220, scale=Math.min(1, maxW/img.naturalWidth);
  const w=Math.round(img.naturalWidth*scale), h=Math.round(img.naturalHeight*scale);
  const existing=state.logos.S.findIndex(l=>l.id==='ai-logo');
  const logoObj={id:'ai-logo', image:img, src, x:40, y:40, w, h, rotation:0};
  // clamp 需要 layout_S 节点已存在
  if(state.nodes['layout_S']) clampLogo(logoObj);
  if(existing>=0) state.logos.S[existing]=logoObj;
  else state.logos.S.push(logoObj);
  relayoutNodes(); renderAll();
}
logoInput.addEventListener('change', async e=>{
  const files=[...e.target.files]; if(!files.length) return;
  for(const file of files){
    const src=URL.createObjectURL(file); const img=await loadImage(src); const maxW=220, scale=Math.min(1,maxW/img.naturalWidth); const w=Math.round(img.naturalWidth*scale), h=Math.round(img.naturalHeight*scale);
    const logo={id:'logo-'+Date.now()+'-'+Math.random().toString(36).slice(2,7), image:img, src, x:40+state.logos.S.length*30, y:40+state.logos.S.length*30, w, h, rotation:0};
    clampLogo(logo); state.logos.S.push(logo);
  }
  renderAll(); e.target.value='';
});

document.getElementById('zoomOutBtn').onclick=()=>setZoom(state.zoom/1.15);
document.getElementById('zoom50Btn').onclick=()=>setZoom(0.5);
document.getElementById('zoom100Btn').onclick=()=>setZoom(1);
document.getElementById('zoom200Btn').onclick=()=>setZoom(2);
document.getElementById('fitBtn').onclick=fitToScreen;
(function init(){initState(); relayoutNodes(); renderAll(); fitToScreen();})();
